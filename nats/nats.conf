# Server identity
server_name: "academy-nats"

# Portas
port: 4222
http_port: 8222

# JetStream habilitado
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 512MB
  max_file_store: 4GB
}

# Logs
log_time: true
debug: false
trace: false
