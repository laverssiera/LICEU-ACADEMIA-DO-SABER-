name: Update Roadmap Status

on:
  issues:
    types:
      - opened
      - closed
      - reopened
      - edited
      - labeled
      - unlabeled
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  update-roadmap:
    if: github.repository == 'laverssiera/LICEU-ACADEMIA-DO-SABER-'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Update roadmap table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-roadmap-status.sh "${{ github.repository }}"

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No changes in README.md"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): update roadmap status table"
          git push
